name: Finance RAG CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: finance-rag-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  BACKEND_IMAGE: adithya09/finance-rag-advisor-backend
  FRONTEND_IMAGE: adithya09/finance-rag-advisor-frontend

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        run: docker compose config

  integration-test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Build and Start Containers
        run: docker compose up -d --build
      - name: Wait for Backend Health
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs backend
          exit 1
      - run: curl -f http://localhost:8000/health
      - run: curl -I http://localhost:3000
      - if: always()
        run: docker compose down -v

  publish-images:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: backend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.backend-meta.outputs.tags }}
          labels: ${{ steps.backend-meta.outputs.labels }}
      - id: frontend-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend-meta.outputs.tags }}
          labels: ${{ steps.frontend-meta.outputs.labels }}

  sync-config:
    runs-on: ubuntu-latest
    needs: publish-images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.EC2_TARGET_PATH }}
      - name: Copy nginx
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "nginx/*"
          target: ${{ secrets.EC2_TARGET_PATH }}

  deploy:
    runs-on: ubuntu-latest
    needs: sync-config
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            cd ${{ secrets.EC2_TARGET_PATH }}

            echo "Cleaning old dangling images..."
            docker image prune -af || true

            echo "Docker disk usage before pull:"
            docker system df

            echo "Pulling latest images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Recreating containers..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans

            echo "Waiting for application..."

            for i in {1..30}; do
              if curl -fs http://localhost/health >/dev/null; then
                echo "Application is healthy."
                curl http://localhost/health

                echo "Running containers:"
                docker ps

                echo "Final Docker disk usage:"
                docker system df

                echo "Deployment completed successfully."
                exit 0
              fi

              echo "Attempt $i/30..."
              sleep 5
            done

            echo "Deployment failed."

            docker ps
            docker logs rag-backend --tail=100

            exit 1
